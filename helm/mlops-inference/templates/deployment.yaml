apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mlops-inference.fullname" . }}
  labels:
    {{- include "mlops-inference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mlops-inference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mlops-inference.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: inference
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: MODEL_RUN_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mlops-inference.fullname" . }}-config
                  key: MODEL_RUN_ID
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
