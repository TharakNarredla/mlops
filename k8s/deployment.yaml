apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-inference
  labels:
    app: mlops-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-inference
  template:
    metadata:
      labels:
        app: mlops-inference
    spec:
      containers:
        - name: inference
          image: mlops-inference:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_RUN_ID
              valueFrom:
                configMapKeyRef:
                  name: mlops-inference-config
                  key: MODEL_RUN_ID
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
