apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-inference
  labels:
    app: mlops-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-inference
  template:
    metadata:
      labels:
        app: mlops-inference
    spec:
      containers:
        - name: inference
          image: mlops-inference:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_RUN_ID
              valueFrom:
                configMapKeyRef:
                  name: mlops-inference-config
                  key: MODEL_RUN_ID
